<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Raghukul</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        
        /* Login Box Styling */
        #login-container { display: flex; justify-content: center; align-items: center; height: 80vh; display: none; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); text-align: center; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* Dashboard Styling */
        #admin-content { display: none; max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 3px solid #f1c40f; padding-bottom: 10px; }
        .section-title { margin-top: 30px; background: #2c3e50; color: white; padding: 10px; border-radius: 5px; }
        
        /* Table Controls */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background: #34495e; color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .screenshot-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
        .logout-btn { float: right; background: #95a5a6; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>🚩 Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Login Karein</button>
        </div>
    </div>

    <div id="admin-content">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h2>🚩 Shree Raghukul Admin Dashboard</h2>

        <h3 class="section-title">Naye Sadasya (Members List)</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Naam</th><th>Mobile</th><th>Pata</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="member-table"></tbody>
            </table>
        </div>

        <h3 class="section-title">Donations & Screenshots</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Naam</th><th>Mobile</th><th>Screenshot</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="donation-table"></tbody>
            </table>
        </div>
    </div>

<script>
    // --- SECURITY & LOGIN LOGIC ---
    
    // Page load hote hi turant faisla karein
    window.onload = function() {
        if (sessionStorage.getItem('isLogged') === 'true') {
            showDashboard();
        } else {
            document.getElementById('login-container').style.display = 'flex';
        }
    };

    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === "admin" && pass === "raghukul@123") {
            sessionStorage.setItem('isLogged', 'true');
            showDashboard();
        } else {
            alert("Galat ID ya Password! Kripya sahi jankari bharein.");
        }
    }

    function showDashboard() {
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadAdminData();
    }

    function logout() {
        sessionStorage.removeItem('isLogged');
        alert("Aap logout ho chuke hain.");
        location.reload(); // Wapas login screen par bhej dega
    }

    // --- DATA LOADING & DELETE ---
    async function loadAdminData() {
        try {
            // Members Fetch
            const resMem = await fetch('/get-members');
            const members = await resMem.json();
            const memberTable = document.getElementById('member-table');
            memberTable.innerHTML = members.length > 0 ? members.map(m => `
                <tr>
                    <td style="color:#27ae60; font-weight:bold;">${m.samitiId || 'Wait..'}</td>
                    <td>${m.fullName}</td><td>${m.mobile}</td><td>${m.address}</td>
                    <td><button class="btn-delete" onclick="deleteEntry('member', '${m._id}')">Delete</button></td>
                </tr>
            `).join('') : "<tr><td colspan='5' style='text-align:center;'>Koi data nahi mila</td></tr>";

            // Donations Fetch
            const resDon = await fetch('/get-donations');
            const donations = await resDon.json();
            const donationTable = document.getElementById('donation-table');
            donationTable.innerHTML = donations.length > 0 ? donations.map(d => `
                <tr>
                    <td>${d.name}</td><td>${d.phone}</td>
                    <td><a href="/uploads/donations/${d.screenshot}" target="_blank"><img src="/uploads/donations/${d.screenshot}" class="screenshot-img" alt="QR"></a></td>
                    <td><button class="btn-delete" onclick="deleteEntry('donation', '${d._id}')">Delete</button></td>
                </tr>
            `).join('') : "<tr><td colspan='4' style='text-align:center;'>Koi donation nahi mila</td></tr>";

        } catch (error) {
            console.error("Data load karne mein error:", error);
        }
    }

    async function deleteEntry(type, id) {
        if(confirm('Kya aap is entry ko hamesha ke liye delete karna chahte hain?')) {
            try {
                const res = await fetch(`/delete-entry/${type}/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) { 
                    alert("Entry delete ho gayi!"); 
                    loadAdminData(); 
                }
            } catch (err) {
                alert("Delete karne mein dikkat aayi.");
            }
        }
    }
</script>

</body>
</html>
