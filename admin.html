<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Raghukul Sewa Parivar</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .screenshot-img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .section-title { margin-top: 40px; background: #27ae60; color: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚩 Shree Raghukul Admin Panel</h2>

    <h3 class="section-title">Madad ke Aavedan (Help Requests)</h3>
    <table>
        <thead>
            <tr>
                <th>Naam</th>
                <th>Mobile</th>
                <th>Karan</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="help-table"></tbody>
    </table>

    <h3 class="section-title">Sadasya List (Members)</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Naam</th>
                <th>Mobile</th>
                <th>Pata</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="member-table"></tbody>
    </table>

    <h3 class="section-title">Donations & Screenshots</h3>
    <table>
        <thead>
            <tr>
                <th>Naam</th>
                <th>Mobile</th>
                <th>Screenshot</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="donation-table"></tbody>
    </table>
</div>

<script>
    // Data load karne ka function
    async function loadAdminData() {
        // Fetch Help
        const resHelp = await fetch('/get-help-requests');
        const helps = await resHelp.json();
        const helpTable = document.getElementById('help-table');
        helpTable.innerHTML = helps.map(h => `
            <tr>
                <td>${h.name}</td>
                <td>${h.phone}</td>
                <td>${h.reason}</td>
                <td><button class="btn-delete" onclick="deleteEntry('help', '${h._id}')">Delete</button></td>
            </tr>
        `).join('');

        // Fetch Members
        const resMem = await fetch('/get-members');
        const members = await resMem.json();
        const memTable = document.getElementById('member-table');
        memTable.innerHTML = members.map(m => `
            <tr>
                <td style="font-weight:bold; color:#27ae60;">${m.samitiId || 'N/A'}</td>
                <td>${m.fullName}</td>
                <td>${m.mobile}</td>
                <td>${m.address}</td>
                <td><button class="btn-delete" onclick="deleteEntry('member', '${m._id}')">Delete</button></td>
            </tr>
        `).join('');

        // Fetch Donations
        const resDon = await fetch('/get-donations');
        const donations = await resDon.json();
        const donTable = document.getElementById('donation-table');
        donTable.innerHTML = donations.map(d => `
            <tr>
                <td>${d.name}</td>
                <td>${d.phone}</td>
                <td>
                    <a href="/uploads/donations/${d.screenshot}" target="_blank">
                        <img src="/uploads/donations/${d.screenshot}" class="screenshot-img" alt="QR Screenshot">
                    </a>
                </td>
                <td><button class="btn-delete" onclick="deleteEntry('donation', '${d._id}')">Delete</button></td>
            </tr>
        `).join('');
    }

    // Admin.html mein ye function replace karein
async function deleteEntry(type, id) {
    if(confirm('Kya aap ise hamesha ke liye delete karna chahte hain?')) {
        try {
            const response = await fetch(`/delete-entry/${type}/${id}`, {
                method: 'DELETE'
            });
            const result = await response.json();
            if(result.success) {
                alert('Entry delete ho gayi!');
                loadAdminData(); // List ko turant refresh karne ke liye
            }
        } catch (err) {
            alert('Delete karne mein error aaya!');
        }
    }
}
</script>

</body>
</html>
